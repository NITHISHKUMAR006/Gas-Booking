# ─────────────────────────────────────────────────────────────────────────────
#  Gas Booking System  |  docker-compose.yml
#  Services: app (Flask) + db (MySQL 8)
#  External access: http://localhost:5002
#  MySQL page: http://localhost:5002/mysql
# ─────────────────────────────────────────────────────────────────────────────


services:

  # ── MySQL Database ─────────────────────────────────────────────────────────
  db:
    image: "mysql:8.0"
    container_name: "gasbook_db"
    restart: "unless-stopped"
    env_file:
      - config.env
    command:
      - "--default-time-zone=+05:30"
      - "--default-authentication-plugin=caching_sha2_password"
    volumes:
      - "./src/init.sql:/docker-entrypoint-initdb.d/init.sql:ro"
    ports:
      - "127.0.0.1:${MYSQL_PORT:-3306}:${MYSQL_PORT:-3306}"
    networks:
      - gasbook_net
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-uroot", "-p${MYSQL_ROOT_PASSWORD:-rootpassword}"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s

  # ── phpMyAdmin (internal only, proxied by Flask at /mysql) ────────────────
  phpmyadmin:
    image: phpmyadmin:latest
    container_name: gasbook_phpmyadmin
    restart: unless-stopped
    env_file:
      - config.env
    environment:
      PMA_HOST     : "db"
      PMA_USER     : "${MYSQL_USER:-gasbook_user}"
      PMA_PASSWORD : "${MYSQL_PASSWORD:-gasbook_pass}"
      PMA_PORT     : "${MYSQL_PORT:-3306}"
      UPLOAD_LIMIT : "104857600"
      PHP_UPLOAD_MAX_FILESIZE: "100M"
      PHP_POST_MAX_SIZE: "100M"
      PMA_ABSOLUTE_URI: /mysql/
    depends_on:
      - db
    networks:
      - gasbook_net

  # ── Flask Application ──────────────────────────────────────────────────────
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: gasbook_app
    restart: unless-stopped
    env_file:
      - config.env
    environment:
      - TZ=${TIMEZONE:-Asia/Kolkata}
    ports:
      - "${FLASK_PORT:-5002}:${FLASK_PORT:-5002}" 
    depends_on:
      db:
        condition: service_healthy
      phpmyadmin:
        condition: service_started
    networks:
      - gasbook_net
    volumes:
      - .:/app
    command: python app.py

# ── Networks ──────────────────────────────────────────────────────────────────
networks:
  gasbook_net:
    driver: bridge
